name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: compose-validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Inject CI env vars
        run: |
          echo "SUPABASE_URL=https://example.supabase.co" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=ci-service-role-key" >> $GITHUB_ENV
          echo "APP_SECRET_KEY=ci-secret-key" >> $GITHUB_ENV
          echo "BOT_API_URL=http://localhost:3001" >> $GITHUB_ENV

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: compose-validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run linter
        run: |
          cd frontend
          npm run lint

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'VG776/GigKavach'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: frontend-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'VG776/GigKavach'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: "--prod"
