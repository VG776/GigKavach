services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=https://rwzjpuxyaxjymhjkpxrm.supabase.co

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  worker-pwa:
    build: ./worker-pwa
    ports:
      - "4173:4173"
    volumes:
      - ./worker-pwa:/app
      - worker_pwa_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  worker_pwa_node_modules:
