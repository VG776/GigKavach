services:
  - type: web
    name: gigkavach-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_PRODUCTION_URL
        value: https://gigkavach-delta.vercel.app
      - key: WORKER_PWA_URL
        value: https://your-worker-pwa.vercel.app
      - key: WORKER_PWA_LOCAL_URL
        value: http://localhost:4173
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: TOMORROW_IO_API_KEY
        sync: false
      - key: AQICN_API_TOKEN
        sync: false
